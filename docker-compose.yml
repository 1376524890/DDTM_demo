services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports: ["9000:9000", "9001:9001"]
    volumes: ["miniodata:/data"]

  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    entrypoint: ["anvil", "--host", "0.0.0.0", "--chain-id", "31337", "--block-time", "1"]
    ports: ["8545:8545"]

  experiments:
    build:
      context: .
      dockerfile: experiments/Dockerfile
    image: ddtm-experiments:latest
    working_dir: /workspace
    volumes:
      - .:/workspace
      - go-cache:/root/go
      - cargo-cache:/root/.cargo
      - foundry-cache:/root/.foundry
    environment:
      - PATH=/opt/venv/bin:/usr/local/go/bin:/root/.cargo/bin:/root/.foundry/bin:${PATH}
    profiles:
      - experiments
    # One-shot service: run with `docker compose run --rm experiments <command>`
    entrypoint: ["/bin/bash"]

volumes:
  pgdata:
  miniodata:
  go-cache:
  cargo-cache:
  foundry-cache:
