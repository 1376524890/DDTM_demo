name: DDTM V1 CI

on:
  push:
    branches:
      - master
      - feature/system-integration-v1
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  zkp-and-contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.7"
          cache-dependency-path: ddtm_zkp/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.16.0"

      - name: Test V1 circuits
        working-directory: ddtm_zkp
        run: |
          set -o pipefail
          go mod tidy
          mkdir -p /tmp/ddtm-v1-go-modules
          cp go.mod go.sum /tmp/ddtm-v1-go-modules/
          go test ./v1/... ./cmd/v1setup ./cmd/v1prove ./cmd/v1prover 2>&1 | tee /tmp/ddtm-v1-go-test.log

      - name: Upload Go test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ddtm-v1-go-test-diagnostics
          path: |
            /tmp/ddtm-v1-go-test.log
            /tmp/ddtm-v1-go-modules/go.mod
            /tmp/ddtm-v1-go-modules/go.sum
          if-no-files-found: warn

      - name: Generate proving keys and Solidity verifiers
        working-directory: ddtm_zkp
        run: |
          mkdir -p bin artifacts/v1 ../ddtm_evm/contracts/generated
          go run ./cmd/v1setup --artifacts artifacts/v1 --contracts ../ddtm_evm/contracts/generated
          go build -o bin/v1prove ./cmd/v1prove

      - name: Install Hardhat dependencies
        working-directory: ddtm_evm
        run: npm install --no-audit --no-fund

      - name: Run mock and real-proof EVM tests
        working-directory: ddtm_evm
        env:
          DDTM_V1_REAL_ZKP: "1"
          DDTM_V1_PROVER_BIN: ../ddtm_zkp/bin/v1prove
          DDTM_V1_ZKP_ARTIFACTS: ../ddtm_zkp/artifacts/v1
        run: |
          set -o pipefail
          npx hardhat test 2>&1 | tee /tmp/ddtm-v1-evm-test.log

      - name: Upload EVM test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ddtm-v1-evm-test-log
          path: /tmp/ddtm-v1-evm-test.log
          if-no-files-found: warn

      - name: Upload circuit manifest and verifier contracts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ddtm-v1-zkp-manifest
          path: |
            ddtm_zkp/artifacts/v1/manifest.json
            ddtm_evm/contracts/generated/*.sol
          if-no-files-found: error

  gateway:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.16.0"

      - name: Install gateway dependencies
        working-directory: services/gateway
        run: npm install --no-audit --no-fund

      - name: Check gateway syntax
        working-directory: services/gateway
        run: |
          npm run check
          for file in src/*.js; do node --check "$file"; done

      - name: Run gateway tests
        working-directory: services/gateway
        run: npm test

  compose-definition:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate Docker Compose definition
        run: |
          cp .env.example .env
          docker compose config --quiet

      - name: Verify required V1 paths
        run: |
          set -euo pipefail
          test -f ddtm_evm/contracts/DDTM.sol
          test -f ddtm_zkp/v1/circuits/circuits.go
          test -f services/gateway/src/server.js
          test -f services/gateway/sql/init.sql
          test -f scripts/v1_smoke.sh
          test -f docker-compose.yml

  integrated-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure local research stack
        run: cp .env.example .env

      - name: Build and start all services
        run: docker compose up --build -d

      - name: Wait for gateway health
        run: |
          set -euo pipefail
          for attempt in $(seq 1 120); do
            if curl -fsS http://127.0.0.1:8080/health; then
              exit 0
            fi
            sleep 2
          done
          docker compose ps
          exit 1

      - name: Run decrypt-before-confirm smoke test
        run: bash scripts/v1_smoke.sh 2>&1 | tee /tmp/ddtm-v1-smoke.log

      - name: Capture integration diagnostics
        if: always()
        run: |
          docker compose ps > /tmp/ddtm-v1-compose-ps.log || true
          docker compose logs --no-color > /tmp/ddtm-v1-compose.log || true

      - name: Upload integration diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ddtm-v1-integration-diagnostics
          path: |
            /tmp/ddtm-v1-smoke.log
            /tmp/ddtm-v1-compose-ps.log
            /tmp/ddtm-v1-compose.log
          if-no-files-found: warn

      - name: Stop stack
        if: always()
        run: docker compose down -v --remove-orphans
